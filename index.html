<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books website</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <header class="header">

        <div class="header-img">
            <img src="images/Magic Books.svg" alt="Magic Books logo">
        </div>

        <nav class="header-nav">
            <a href="#" class="header-nav-link header-item">Home</a>
            <a href="#" class="header-nav-link header-item">Promotions</a>
            <a href="#" class="header-nav-link header-item">Books</a>
            <a href="#" class="header-nav-link header-item">Ebooks</a>
            <a href="#" class="header-nav-link header-item">Audiobooks</a>
            <a href="#" class="header-nav-link header-item">Podcasts</a>
            <a href="#" class="header-nav-link header-item">Games</a>
        </nav>

        <div class="header-icon-list">
            <a href="#" class="header-icon-link header-item"><img src="images/search.svg" alt="search"></a>
            <a href="#" class="header-icon-link header-item"><img src="images/buy.svg" alt="shopping cart"></a>
            <a href="#" class="header-icon-link header-item"><img src="images/person.svg" alt="account"></a>
        </div>

    </header>

    <section class="title-page">
        <img src="./images/Banner website (1).png" alt="">
        <div class="container">

            <div class="title-page__info">
                <h2 class="title-page__suptitle">Bookstore <b>Magic Books</b></h2>

                <h1 class="title-page__title">Best sellers with 40% off + free shopping</h1>

                <div class="title-page__buttons">
                    <a href="" class="title-page__button">Buy now</a>
                    <a href="" class="title-page__button">Only until 11/12</a>
                    <a href="" class="title-page__button">Online purchases only</a>
                </div>

                <div class="title-page__desc">*Valid for purchases over R$99</div>
            </div>

            <div class="title-page__photo">
                <img src="" alt="Books">
            </div>

        </div>
    </section>

    <section class="book-shelf">
        <h2 class="book-shelf__title">best seller</h2>

        <div class="slider">
            <img class="slider__img" src="./images/419CqGgAdZL._SY445_SX342_ 1.png" alt="">
            <img class="slider__img" src="./images/419JCm3Tr+L._SY445_SX342_ 1.png" alt="">
            <img class="slider__img" src="./images/51UmNg33hCL._SY445_SX342_ 1.png" alt="">
            <img class="slider__img" src="./images/81+efMYN9wL._SY522_ 1.png" alt="">
            <img class="slider__img" src="./images/81AHTyq2wVL._SY522_ 1.png" alt="">
            <img class="slider__img" src="./images/91UN+1U66JL._SY522_ 1.png" alt="">
        </div>
    </section>
    
</body>
</html>
